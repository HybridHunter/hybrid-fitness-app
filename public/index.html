<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#8fbf3b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="GymKit" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <title>GymKit</title>
  <style>body { margin: 0; }</style>
  <script>
    // Pre-fetch gym branding from URL before React loads
    // URL pattern: /gym/:gymId/...
    (function() {
      var SUPABASE_URL = 'https://qzvxnklyeadbroesccxt.supabase.co';
      var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF6dnhua2x5ZWFkYnJvZXNjY3h0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNTI5MTgsImV4cCI6MjA5MDcyODkxOH0.nDa1iuZwS0E2j-rGizIvVuPRslYn7ugChPJiW-ejSMM';

      function applyBranding(branding) {
        if (!branding) return;
        var gymName = branding.gymName || 'GymKit';
        var color = branding.primaryColor || '#8fbf3b';
        var logo = branding.logo || '';
        var pwaIcon = branding.pwaIcon || '';
        var iconSrc = pwaIcon || logo || '';

        document.title = gymName;

        var themeMeta = document.querySelector('meta[name="theme-color"]');
        if (themeMeta) themeMeta.content = color;

        var appleMeta = document.querySelector('meta[name="apple-mobile-web-app-title"]');
        if (appleMeta) appleMeta.content = gymName;

        // Update apple-touch-icon: prefer pwaIcon, then logo
        if (iconSrc) {
          var appleIcon = document.querySelector('link[rel="apple-touch-icon"]');
          if (appleIcon) appleIcon.href = iconSrc;
        }

        // Generate dynamic manifest
        var startUrl = window.location.pathname.match(/^\/gym\/[^/]+/)
          ? window.location.pathname.match(/^\/gym\/[^/]+/)[0] + '/'
          : '/';

        var manifest = {
          short_name: gymName,
          name: gymName,
          description: gymName + ' — Your fitness journey',
          icons: [
            { src: iconSrc || '/icon-192.png', type: 'image/png', sizes: '192x192', purpose: 'any' },
            { src: iconSrc || '/icon-512.png', type: 'image/png', sizes: '512x512', purpose: 'any' }
          ],
          start_url: startUrl,
          display: 'standalone',
          orientation: 'portrait',
          theme_color: color,
          background_color: '#080c12',
          scope: '/'
        };

        var blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
        var link = document.querySelector('link[rel="manifest"]');
        if (link) link.href = URL.createObjectURL(blob);
      }

      // 1. Try localStorage first (instant)
      try {
        var cached = JSON.parse(localStorage.getItem('hf_branding') || '{}');
        if (cached.gymName) applyBranding(cached);
      } catch(e) {}

      // 2. Extract gym ID from URL and fetch from Supabase
      var match = window.location.pathname.match(/^\/gym\/([^/]+)/);
      if (match) {
        var gymId = match[1];
        // Store gym ID so React picks it up
        localStorage.setItem('hf_gym_id', gymId);

        // Fetch branding from Supabase
        var url = SUPABASE_URL + '/rest/v1/data_store?select=value&gym_id=eq.' + encodeURIComponent(gymId) + '&key=eq.hf_branding';
        fetch(url, {
          headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
        })
        .then(function(res) { return res.json(); })
        .then(function(rows) {
          if (rows.length > 0 && rows[0].value) {
            var branding = rows[0].value;
            // Cache it locally
            localStorage.setItem('hf_branding', JSON.stringify(branding));
            applyBranding(branding);
          }
        })
        .catch(function() {});
      }
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js').catch(function() {});
      });
    }
  </script>
</body>
</html>
